version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/camera-ui-*"
    schedule:
      interval: weekly
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/camera-ui-*"
    schedule:
      interval: weekly
